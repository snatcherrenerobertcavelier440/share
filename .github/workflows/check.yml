name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bunx playwright install --with-deps chromium
      - name: Start local Worker
        run: |
          bunx wrangler dev --local --port 8796 \
            --var TURNSTILE_SITE_KEY:1x00000000000000000000AA \
            --var TURNSTILE_SECRET_KEY:1x0000000000000000000000000000000AA > /tmp/share-dev.log 2>&1 &
          for i in {1..30}; do curl -fsS http://localhost:8796/api/config && exit 0; sleep 1; done
          cat /tmp/share-dev.log
          exit 1
      - run: bun run browser:e2e
